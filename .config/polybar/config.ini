[colors]
darkgray = #928374
orange = #fb4934
white = #ebdbb2
gray = #585858
black = #090909
red = #c795ae
blue = #95aec7
yellow = #c7ae95
green = #aec795
background = #262626
background-alt = #4e4e4e
foreground = #ebdbb2
foreground-alt = #4e4e4e
primary = #1f222d
secondary = #FF6200
alert = #fb4934

[bar/internal]
monitor = eDP-1
wm-restack = bspwm
width = 1668
height = 26
offset-x = 12
offset-y = 12
locale = en_GB.UTF-8
enable-ipc = true
padding-left = 0
padding-right = 0
module-margin-right = 0
module-margin-left = 0
modules-right = keyboard separator network separator pulseaudio separator backlight separator battery separator date
modules-center = mpd
modules-left = bspwm
background = ${colors.background}
foreground = ${colors.foreground}
underline-size = 0
underline-color = ${colors.white}
font-0 = "JetBrains Mono NF:style=Bold:size=10;2"
font-1 = "FontAwesome:size=10;2"
font-2 = "Source Han Sans CN,:style=Bold:size=10;2"

[bar/external]
monitor = DP-1
wm-restack = bspwm
width = 1896
height = 26
offset-x = 12
offset-y = 12
locale = en_GB.UTF-8
enable-ipc = true
padding-left = 0
padding-right = 0
module-margin-right = 0
module-margin-left = 0
modules-right = keyboard separator network separator pulseaudio separator battery separator date
modules-center = mpd
modules-left = bspwm
background = ${colors.background}
foreground = ${colors.foreground}
underline-size = 0
underline-color = ${colors.white}
font-0 = "JetBrains Mono Nerd Font:style=Bold:size=10;2"
font-1 = "FontAwesome:size=10;2"
font-2 = "Source Han Sans CN,:style=Bold:size=10;2"

[module/mpd]
type = internal/mpd
host = 127.0.0.1
port = 6600
format-online =<icon-prev><label-song><icon-next>
format-online-underline = ${colors.white}
format-online-padding = 1
label-song = %{A1:mpc toggle:}%artist% - %title%%{A}
icon-play = 
icon-pause = 
icon-prev = 
icon-next = 
icon-prev-foreground = ${colors.darkgray}
icon-next-foreground = ${colors.darkgray}
icon-play-padding = 1
icon-pause-padding = 1
icon-prev-padding = 1
icon-next-padding = 1
label-song-padding = 1

[module/bspwm]
type = internal/bspwm
format = <label-state> <label-mode>
label-focused-background = ${colors.background-alt}
label-focused-underline= ${colors.white}
label-focused-padding = 2
label-occupied-foreground = ${colors.darkgray}
label-occupied-padding = 2
label-urgent-background = ${colors.alert}
label-urgent-padding = 2
label-empty-foreground = ${colors.foreground-alt}
label-empty-padding = 2

[module/date]
type = internal/date
date = %{F#928374} %{F-} %H:%M
date-alt = %{F#928374}%{F-}  %a %d %b
interval = 5
format-underline = ${colors.white}
format-foreground = ${colors.foreground}
format-padding = 2
label-separator = |

[module/pulseaudio]
type = internal/pulseaudio
format-volume = <label-volume>
format-volume-padding = 2
format-volume-underline = ${colors.white}
label-volume = %{F#928374} %{F-}%percentage:3%%
label-muted =%{F#928374} %{F-}mute
format-muted = <label-muted>
format-muted-underline = ${colors.white}
format-muted-padding = 2
format-padding = 2

[module/keyboard]
type = internal/xkeyboard
format =   %{F-}<label-layout>
format-spacing = 0
format-underline = ${colors.white}
label-layout = %layout%
format-padding = 2
label-indicator = %name%
label-indicator-padding = 0

[module/network]
type = internal/network
interface = wlan0
interval = 3.0
accumulate-stats = true
format-connected-padding = 2
format-disconnected-padding = 2
format-connected-underline = ${colors.white}
format-disconnected-underline = ${colors.white}
format-connected = %{F#928374}  %{F-}<label-connected>
format-disconnected = <label-disconnected>
format-packetloss = <animation-packetloss> <label-connected>
label-connected = %signal%%
label-disconnected = %{F#928374} %{F-}none
animation-packetloss-0 = ⚠
animation-packetloss-framerate = 500

[module/battery]
type = internal/battery
battery = BAT1
label-full = %{F#928374}  %{F-}%percentage:3%%
format-charging = <label-charging>
label-charging = %{F#928374} %{F-}%percentage:3%%
format-discharging = <ramp-capacity> <label-discharging>
label-discharging = %{F-}%percentage:3%%
ramp-capacity-0 = %{F#928374}
ramp-capacity-1 = %{F#928374}
ramp-capacity-2 = %{F#928374}
ramp-capacity-3 = %{F#928374}
ramp-capacity-4 = %{F#928374}
format-full-padding = 2
format-charging-padding = 2
format-discharging-padding = 2

[module/separator]
type = custom/text
format = |
content-foreground = ${colors.darkgray}

[module/backlight]
type = internal/backlight
card = intel_backlight
enable-scroll = true
label = %{F#928374}  %{F-}%percentage%%
format-padding = 2
